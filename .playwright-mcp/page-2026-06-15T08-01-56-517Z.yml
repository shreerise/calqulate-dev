            - heading "BMI Calculator for Men — The Muscle Problem" [level=2] [ref=e362]:
              - img [ref=e363]
              - text: BMI Calculator for Men — The Muscle Problem
            - paragraph [ref=e366]: If you lift weights, play sports, or have a physically active job, your BMI calculator result may show "overweight" or even "obese" — while your actual body fat is perfectly healthy. This is BMI's most well-known limitation for men.
            - paragraph [ref=e367]:
              - text: "Here's a real example: a 5'11\" man who weighs 195 lbs has a BMI of 27.2 — technically overweight by the BMI scale. But if his waist is 32 inches and he can run a 10-minute mile, he's in better cardiovascular health than someone with a BMI of 23 who sits all day."
              - strong [ref=e368]: For men, BMI is most accurate when combined with waist circumference.
