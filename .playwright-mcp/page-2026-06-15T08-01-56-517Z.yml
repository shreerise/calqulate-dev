                  - generic [ref=e339]:
                    - paragraph [ref=e340]: Menopause & After 50
                    - paragraph [ref=e341]: Estrogen decline shifts fat from hips to abdomen. Even with a normal BMI, waist circumference above 35 inches signals elevated metabolic risk post-menopause.
