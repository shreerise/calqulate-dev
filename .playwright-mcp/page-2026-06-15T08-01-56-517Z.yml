                - generic [ref=e314]:
                  - img [ref=e315]
                  - generic [ref=e318]:
                    - paragraph [ref=e319]: PCOS & Thyroid Conditions
                    - paragraph [ref=e320]: Both conditions directly alter fat storage and weight. Women with PCOS may have a higher BMI at the same calorie intake as unaffected women. Your BMI number is not a reflection of effort or willpower.
                - generic [ref=e321]:
