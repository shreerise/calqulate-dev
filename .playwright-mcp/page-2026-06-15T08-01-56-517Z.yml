          - generic [ref=e422]:
            - heading "Walking Plan According to Your BMI — The Best Starting Point" [level=2] [ref=e423]:
              - img [ref=e424]
              - text: Walking Plan According to Your BMI — The Best Starting Point
            - paragraph [ref=e427]: "Walking is the most underrated fat-loss tool. Research published in the Journal of the American Medical Association (JAMA) found that walking 7,000–9,000 steps daily reduces all-cause mortality by 50–70%. It doesn't spike cortisol, doesn't require equipment, and works at any BMI level. Here's a personalized walking plan based on your BMI result:"
            - generic [ref=e428]:
              - generic [ref=e429]:
                - heading "BMI 18.5–24.9 (Normal)" [level=3] [ref=e430]
                - paragraph [ref=e431]: "Maintenance: 7,000–10,000 steps/day. Add 2 strength sessions/week to maintain lean mass. Walk after dinner — it lowers blood sugar spikes by up to 30%."
              - generic [ref=e432]:
                - heading "BMI 25–29.9 (Overweight)" [level=3] [ref=e433]
                - paragraph [ref=e434]: "Week 1–2: 5,000 steps/day. Week 3–4: 7,000 steps. Week 5+: 10,000 steps. Brisk pace (3–4 mph). This pace burns 200–300 calories/hour and lowers blood pressure measurably within 8 weeks."
              - generic [ref=e435]:
                - heading "BMI 30–35 (Obese Class I)" [level=3] [ref=e436]
                - paragraph [ref=e437]: "Start with 15-min walks twice daily. Build to 30 min continuous by week 4. Flat terrain first — reduce joint impact. Target: 6,000–8,000 steps/day by week 6. Small increments = sustainable results."
              - generic [ref=e438]:
                - heading "BMI 35+ (Obese Class II–III)" [level=3] [ref=e439]
                - paragraph [ref=e440]: Consult your doctor before starting. Water walking or pool walking removes 90% of joint impact. Start with 10 min/day and add 2 min per week. Walking 45–60 min daily at this level can produce 1–2 lb/week loss.
            - generic [ref=e441]:
              - strong [ref=e442]: "Pro tip:"
              - text: A 10-minute walk after each meal (breakfast, lunch, dinner) totals 30 minutes with none of the mental barrier of "going to exercise." Studies show this routine specifically reduces postmeal blood sugar spikes — a key factor in preventing type 2 diabetes regardless of BMI.
          - generic [ref=e443]:
            - heading "BMI Calculator by Age — How Your Number Changes Over Time" [level=2] [ref=e444]:
              - img [ref=e445]
              - text: BMI Calculator by Age — How Your Number Changes Over Time
            - paragraph [ref=e448]: The BMI formula itself doesn't change with age — but what your BMI means does. As you get older, your muscle mass naturally declines (a process called sarcopenia), your metabolism slows, and fat redistributes toward the abdomen. Two people can have identical BMIs at age 25 and 55 but wildly different health profiles.
            - generic [ref=e449]:
              - generic [ref=e450]:
                - paragraph [ref=e451]: Your 20s
                - paragraph [ref=e452]: BMI is most straightforward
                - paragraph [ref=e453]: Metabolism is high, muscle mass is naturally elevated. A BMI of 22–24 is genuinely ideal. Watch for the 'freshman 15' or post-college weight gain as activity levels drop.
              - generic [ref=e454]:
                - paragraph [ref=e455]: Your 30s–40s
                - paragraph [ref=e456]: BMI can creep up silently
                - paragraph [ref=e457]: Muscle loss begins around age 30 at ~0.5–1% per year. Weight on the scale may stay constant, but body composition shifts toward more fat. Resistance training becomes critical to keep BMI meaningful.
              - generic [ref=e458]:
                - paragraph [ref=e459]: 50s and Beyond
                - paragraph [ref=e460]: Context matters most
                - paragraph [ref=e461]: Post-menopausal women and older men often have a 'healthy' BMI but elevated visceral fat. Some research suggests a BMI of 25–27 in adults over 65 is associated with better outcomes than a BMI under 22.
