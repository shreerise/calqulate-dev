            - heading "What Is BMI? The Body Mass Index Explained Simply" [level=2] [ref=e108]:
              - img [ref=e109]
              - text: What Is BMI? The Body Mass Index Explained Simply
            - paragraph [ref=e111]: BMI — or Body Mass Index — is a number calculated from your height and weight. It was developed in the 1830s by Belgian mathematician Adolphe Quetelet and later adopted by the WHO as a population-level screening tool. Today, the CDC adult BMI calculator and NHLBI both use the same formula to classify adults into four weight categories.
            - paragraph [ref=e112]:
              - text: "Here's the honest truth most websites skip:"
              - strong [ref=e113]: BMI is a starting point, not a verdict.
              - text: In 2023, the American Medical Association (AMA) updated its official policy to clarify that BMI should not be used as a sole diagnostic measure — especially considering differences across gender, age, and ethnicity, including documented differences in African American BMI chart interpretation versus Asian populations. What BMI does well is give you a fast, free, and reasonably reliable signal about your weight category so you can take the right next step.
            - generic [ref=e114]:
              - generic [ref=e116]:
                - img [ref=e117]
                - text: BMI Formula — How to Calculate BMI in kg and lbs
              - generic [ref=e119]:
                - generic [ref=e120]:
                  - generic [ref=e121]:
                    - heading "Metric Formula (kg/cm):" [level=3] [ref=e122]
                    - paragraph [ref=e123]: BMI = Weight (kg) ÷ Height² (m)
                  - generic [ref=e124]:
                    - heading "Imperial Formula (lbs/inches):" [level=3] [ref=e125]
                    - paragraph [ref=e126]: BMI = [Weight (lbs) ÷ Height² (in)] × 703
                  - paragraph [ref=e127]: The 703 factor converts pounds/inches to the metric equivalent. This is why the CDC BMI calculator and NHLBI BMI calculator produce identical results to our tool.
                - generic [ref=e128]:
                  - generic [ref=e129]:
                    - heading "Example — Calculate my BMI in kg:" [level=3] [ref=e130]
                    - generic [ref=e131]:
                      - paragraph [ref=e132]:
                        - strong [ref=e133]: "Weight:"
                        - text: 70 kg ·
                        - strong [ref=e134]: "Height:"
                        - text: 1.70 m
                      - paragraph [ref=e135]:
                        - strong [ref=e136]: "Math:"
                        - text: 70 ÷ (1.70²) = 70 ÷ 2.89
                      - paragraph [ref=e137]: BMI = 24.2 → Normal Weight
                  - generic [ref=e138]:
                    - heading "Example — 5'4\" female, 155 lbs:" [level=3] [ref=e139]
                    - generic [ref=e140]:
                      - paragraph [ref=e141]:
                        - strong [ref=e142]: "Math:"
                        - text: "[155 ÷ (64²)] × 703"
                      - paragraph [ref=e143]: BMI = 26.6 → Overweight
