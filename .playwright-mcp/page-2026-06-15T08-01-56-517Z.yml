                  - generic [ref=e325]:
                    - paragraph [ref=e326]: Hormonal Weight Fluctuations
                    - paragraph [ref=e327]: Your weight can vary 2–5 lbs across your menstrual cycle due to water retention. A BMI test taken during your period may read 0.5–1 point higher — this is temporary and normal.
                - generic [ref=e328]:
                  - img [ref=e329]
                  - generic [ref=e332]:
                    - paragraph [ref=e333]: Post-Pregnancy Weight
                    - paragraph [ref=e334]: It takes the average woman 6–18 months to return to pre-pregnancy weight. BMI during this period should be interpreted with extra context, not urgency.
