version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - echo "Building Next.js site..."
        - |-
          if [ -n "$RESEND_API_KEY" ]; then
            echo "RESEND_API_KEY=$RESEND_API_KEY" >> .env.production
          else
            echo "Warning: RESEND_API_KEY is not set. Contact form may not work."
          fi
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*