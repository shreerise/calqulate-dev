<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Facial Harmony Calculator — Live Preview (Calqulate)</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  body{font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;}
  .crosshair{cursor:crosshair}
  input[type=number]::-webkit-outer-spin-button,input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  input[type=number]{-moz-appearance:textfield}
</style>
</head>
<body class="bg-slate-100 p-4 md:p-8">
<div class="mx-auto max-w-5xl">
  <div class="rounded-3xl bg-gradient-to-br from-emerald-50 via-white to-lime-50 p-2 ring-1 ring-emerald-200">
    <div class="rounded-[1.4rem] bg-white p-5 md:p-8">
      <span class="inline-block rounded-full bg-emerald-100 px-3 py-1 text-xs font-bold uppercase tracking-wider text-emerald-700">Free Tool · Live Preview</span>
      <h1 class="mt-3 text-2xl md:text-3xl font-bold text-slate-900">Calculate Your Facial Harmony</h1>
      <p class="mt-2 text-slate-600">Upload a photo and tap the landmark points, or type your angles by hand. Everything stays in this browser.</p>
      <div id="app" class="mt-6"></div>
    </div>
  </div>
  <p class="mt-4 text-center text-xs text-slate-400">Standalone preview of the React component shipped in <code>/files</code>. Same math, same features.</p>
</div>

<script>
/* ───────── data (mirror of facial-harmony-data.ts) ───────── */
const METRICS = [
  {id:"gonial",name:"Gonial Angle",short:"Jawline",unit:"deg",ideal:[115,130],tol:20,color:"#10b981",
   blurb:"The angle of the lower jaw measured at the corner below the ear. Lower reads sharper, higher reads softer.",
   points:["Top of jaw near the ear (condylion)","Jaw corner (gonion)","Tip of chin (menton)"],geo:"angle3"},
  {id:"nasolabial",name:"Nasolabial Angle",short:"Nose to lip",unit:"deg",ideal:[95,110],
   idealBySex:{male:[90,105],female:[100,115]},tol:18,color:"#14b8a6",
   blurb:"The angle between the base of the nose and the upper lip. A slight upward tilt reads more feminine.",
   points:["Base of the nose (columella)","Point under the nose (subnasale)","Upper lip edge (labrale superius)"],geo:"angle3"},
  {id:"canthal",name:"Canthal Tilt",short:"Eye angle",unit:"deg",ideal:[2,8],tol:8,color:"#22c55e",
   blurb:"The slope of the eye from inner to outer corner. A small positive tilt reads alert.",
   points:["Inner eye corner (medial canthus)","Outer eye corner (lateral canthus)"],geo:"tilt"},
  {id:"nasofrontal",name:"Nasofrontal Angle",short:"Forehead to nose",unit:"deg",ideal:[115,130],tol:18,color:"#84cc16",
   blurb:"Where the forehead meets the bridge of the nose, viewed from the side.",
   points:["Mid forehead (glabella)","Deepest point at top of nose (nasion)","Bridge of the nose (rhinion)"],geo:"angle3"},
  {id:"mentolabial",name:"Mentolabial Angle",short:"Lip to chin",unit:"deg",ideal:[110,130],tol:18,color:"#65a30d",
   blurb:"The fold between the lower lip and the chin.",
   points:["Lower lip edge (labrale inferius)","Deepest fold below lip (mentolabial sulcus)","Tip of chin (pogonion)"],geo:"angle3"},
  {id:"golden",name:"Golden Ratio",short:"Length to width",unit:"ratio",ideal:[1.5,1.7],tol:0.35,color:"#0d9488",
   blurb:"Face length divided by face width. Faces near Phi (~1.618) read as balanced.",
   points:["Hairline center (trichion)","Tip of chin (menton)","Left cheekbone edge","Right cheekbone edge"],geo:"ratio"},
];
const STORAGE_KEY="calqulate_facial_harmony_results_v1";

/* ───────── trig ───────── */
function angle3(a,b,c){const v1={x:a.x-b.x,y:a.y-b.y},v2={x:c.x-b.x,y:c.y-b.y};
  const dot=v1.x*v2.x+v1.y*v2.y,m1=Math.hypot(v1.x,v1.y),m2=Math.hypot(v2.x,v2.y);
  if(!m1||!m2)return 0;let cos=dot/(m1*m2);cos=Math.min(1,Math.max(-1,cos));return Math.acos(cos)*180/Math.PI;}
function tilt(inner,outer){const dx=Math.abs(outer.x-inner.x),dy=inner.y-outer.y;if(!dx)return 0;return Math.atan2(dy,dx)*180/Math.PI;}
function ratio(t,b,l,r){const len=Math.hypot(b.x-t.x,b.y-t.y),w=Math.hypot(r.x-l.x,r.y-l.y);if(!w)return 0;return len/w;}
function r1(n){return Math.round(n*10)/10;} function r2(n){return Math.round(n*100)/100;}

function idealFor(m,g){return (m.idealBySex&&g!=="neutral")?m.idealBySex[g]:m.ideal;}
function scoreMetric(m,v,g){if(v==null||isNaN(v))return null;const[mn,mx]=idealFor(m,g);
  if(v>=mn&&v<=mx)return 100;const d=v<mn?mn-v:v-mx;return Math.max(0,Math.round(100-(d/m.tol)*100));}
function overall(values,g){const s=[];METRICS.forEach(m=>{const x=scoreMetric(m,values[m.id],g);if(x!=null)s.push(x);});
  return s.length?Math.round(s.reduce((a,b)=>a+b,0)/s.length):null;}
function band(s){if(s>=85)return["Very harmonious","#10b981"];if(s>=70)return["Harmonious","#22c55e"];
  if(s>=55)return["Fairly balanced","#84cc16"];if(s>=40)return["Mixed","#eab308"];return["Room to balance","#f97316"];}
function fmt(m,v){if(v==null||isNaN(v))return"—";return m.unit==="deg"?v+"°":Number(v).toFixed(2);}
function computeValue(m,pts,W,H){if(pts.length<m.points.length)return null;
  const px=pts.map(p=>({x:p.x*W,y:p.y*H}));
  if(m.geo==="angle3")return r1(angle3(px[0],px[1],px[2]));
  if(m.geo==="tilt")return r1(tilt(px[0],px[1]));
  if(m.geo==="ratio")return r2(ratio(px[0],px[1],px[2],px[3]));return null;}

/* ───────── state ───────── */
let S={gender:"neutral",mode:"photo",values:{},img:null,nat:{w:1,h:1},active:METRICS[0].id,points:{},saved:[],compare:[]};
try{const raw=localStorage.getItem(STORAGE_KEY);if(raw)S.saved=JSON.parse(raw);}catch(e){}

function persist(){try{localStorage.setItem(STORAGE_KEY,JSON.stringify(S.saved));}catch(e){}}
function activeMetric(){return METRICS.find(m=>m.id===S.active);}

/* ───────── render ───────── */
const app=document.getElementById("app");
function h(html){const d=document.createElement("div");d.innerHTML=html.trim();return d.firstChild;}

function render(){
  app.innerHTML="";
  // top controls
  app.appendChild(h(`
  <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
    <div class="inline-flex rounded-xl bg-slate-100 p-1" id="modeTabs"></div>
    <div class="inline-flex items-center gap-2">
      <span class="text-xs font-semibold uppercase tracking-wider text-slate-400">Profile</span>
      <div class="inline-flex rounded-xl bg-slate-100 p-1" id="genderTabs"></div>
    </div>
  </div>`));
  const modeTabs=document.getElementById("modeTabs");
  [["photo","📷 Photo mode"],["manual","✏️ Manual mode"]].forEach(([k,t])=>{
    const b=h(`<button class="rounded-lg px-4 py-2 text-sm font-semibold transition ${S.mode===k?"bg-white text-emerald-700 shadow":"text-slate-500 hover:text-slate-700"}">${t}</button>`);
    b.onclick=()=>{S.mode=k;render();};modeTabs.appendChild(b);});
  const gt=document.getElementById("genderTabs");
  [["neutral","Neutral"],["female","Female"],["male","Male"]].forEach(([k,t])=>{
    const b=h(`<button class="rounded-lg px-3 py-1.5 text-sm font-semibold transition ${S.gender===k?"bg-white text-emerald-700 shadow":"text-slate-500 hover:text-slate-700"}">${t}</button>`);
    b.onclick=()=>{S.gender=k;render();};gt.appendChild(b);});

  // grid
  const grid=h(`<div class="mt-6 grid gap-6 lg:grid-cols-2"><div id="left"></div><div id="right"></div></div>`);
  app.appendChild(grid);
  S.mode==="photo"?renderPhoto():renderManual();
  renderResults();
  renderSaved();
  renderCompare();
  app.appendChild(h(`<p class="mt-6 text-center text-xs text-slate-400">Everything you enter stays in this browser. Nothing is uploaded. For general interest, not a medical assessment.</p>`));
}

function renderPhoto(){
  const left=document.getElementById("left");
  const m=activeMetric();const pts=S.points[S.active]||[];
  const wrap=h(`<div class="rounded-2xl bg-white p-4 ring-1 ring-slate-200 sm:p-5"></div>`);
  // chips
  const chips=h(`<div class="mb-4 flex flex-wrap gap-2"></div>`);
  METRICS.forEach(mm=>{
    const done=(S.points[mm.id]||[]).length>=mm.points.length && S.values[mm.id]!=null;
    const sel=S.active===mm.id;
    const b=h(`<button class="rounded-full px-3 py-1.5 text-xs font-semibold transition ${sel?"text-white":"bg-slate-100 text-slate-600 hover:bg-slate-200"}">${done?"✓ ":""}${mm.short}</button>`);
    if(sel)b.style.backgroundColor=mm.color;
    b.onclick=()=>{S.active=mm.id;render();};chips.appendChild(b);});
  wrap.appendChild(chips);

  if(!S.img){
    const up=h(`<label class="flex aspect-[4/5] cursor-pointer flex-col items-center justify-center rounded-2xl border-2 border-dashed border-emerald-300 bg-emerald-50/50 text-center hover:bg-emerald-50">
      <input type="file" accept="image/*" class="hidden" id="file"/>
      <span class="text-4xl">📷</span>
      <span class="mt-3 px-6 text-sm font-semibold text-emerald-700">Upload a photo to start</span>
      <span class="mt-1 px-8 text-xs text-slate-500">Side profile for jaw and nose angles, front-on for eyes and ratio. Your image never leaves your device.</span>
    </label>`);
    wrap.appendChild(up);
    left.appendChild(wrap);
    document.getElementById("file").onchange=onFile;
    return;
  }

  // image with overlay
  const imgBox=h(`<div id="imgwrap" class="crosshair relative w-full select-none overflow-hidden rounded-2xl ring-1 ring-slate-200"></div>`);
  const img=document.createElement("img");img.src=S.img;img.className="block w-full";img.alt="face";
  imgBox.appendChild(img);
  // svg lines
  const svgNS="http://www.w3.org/2000/svg";
  const svg=document.createElementNS(svgNS,"svg");
  svg.setAttribute("viewBox","0 0 100 100");svg.setAttribute("preserveAspectRatio","none");
  svg.setAttribute("class","pointer-events-none absolute inset-0 h-full w-full");
  function line(p,q){const l=document.createElementNS(svgNS,"line");
    l.setAttribute("x1",p.x*100);l.setAttribute("y1",p.y*100);l.setAttribute("x2",q.x*100);l.setAttribute("y2",q.y*100);
    l.setAttribute("stroke",m.color);l.setAttribute("stroke-width","0.5");l.setAttribute("vector-effect","non-scaling-stroke");svg.appendChild(l);}
  if(m.geo==="ratio"){if(pts[0]&&pts[1])line(pts[0],pts[1]);if(pts[2]&&pts[3])line(pts[2],pts[3]);}
  else{for(let i=0;i<pts.length-1;i++)line(pts[i],pts[i+1]);}
  imgBox.appendChild(svg);
  // markers
  pts.forEach((p,i)=>{const dot=h(`<span class="absolute flex h-5 w-5 -translate-x-1/2 -translate-y-1/2 items-center justify-center rounded-full text-[10px] font-bold text-white shadow ring-2 ring-white">${i+1}</span>`);
    dot.style.left=(p.x*100)+"%";dot.style.top=(p.y*100)+"%";dot.style.backgroundColor=m.color;imgBox.appendChild(dot);});
  imgBox.onclick=onImgClick;
  wrap.appendChild(imgBox);

  // instruction
  const next=m.points[pts.length];
  const val=S.values[S.active];const[mn,mx]=idealFor(m,S.gender);
  const instr=h(`<div class="mt-3 rounded-xl bg-slate-50 p-3 ring-1 ring-slate-200"></div>`);
  instr.appendChild(h(next
    ? `<p class="text-sm text-slate-700"><span class="font-bold text-emerald-700">Point ${pts.length+1} of ${m.points.length}:</span> click <strong>${next}</strong></p>`
    : `<p class="text-sm text-slate-700"><span class="font-bold text-emerald-700">${m.name}:</span> <strong>${fmt(m,val)}</strong> <span class="text-slate-500">(balanced ${mn}${m.unit==="deg"?"°":""} to ${mx}${m.unit==="deg"?"°":""})</span></p>`));
  const btns=h(`<div class="mt-2 flex flex-wrap gap-2"></div>`);
  const undo=h(`<button class="rounded-lg bg-white px-3 py-1.5 text-xs font-semibold text-slate-600 ring-1 ring-slate-200 hover:bg-slate-100">Undo point</button>`);
  undo.onclick=()=>{(S.points[S.active]||[]).pop();recompute();render();};
  const clr=h(`<button class="rounded-lg bg-white px-3 py-1.5 text-xs font-semibold text-slate-600 ring-1 ring-slate-200 hover:bg-slate-100">Clear this metric</button>`);
  clr.onclick=()=>{S.points[S.active]=[];recompute();render();};
  const nw=h(`<button class="rounded-lg bg-white px-3 py-1.5 text-xs font-semibold text-rose-600 ring-1 ring-rose-200 hover:bg-rose-50">New photo</button>`);
  nw.onclick=()=>{S.img=null;S.points={};S.values={};render();};
  btns.append(undo,clr,nw);instr.appendChild(btns);
  wrap.appendChild(instr);
  wrap.appendChild(h(`<p class="mt-2 text-xs text-slate-500">${m.blurb}</p>`));
  left.appendChild(wrap);
}

function onFile(e){const f=e.target.files[0];if(!f)return;const rd=new FileReader();
  rd.onload=()=>{const im=new Image();im.onload=()=>{S.nat={w:im.naturalWidth,h:im.naturalHeight};S.img=rd.result;S.points={};S.values={};render();};im.src=rd.result;};
  rd.readAsDataURL(f);}
function onImgClick(e){const wrap=document.getElementById("imgwrap");const rect=wrap.getBoundingClientRect();
  const nx=(e.clientX-rect.left)/rect.width,ny=(e.clientY-rect.top)/rect.height;
  const m=activeMetric();const need=m.points.length;const cur=S.points[S.active]||[];
  S.points[S.active]=cur.length>=need?[{x:nx,y:ny}]:[...cur,{x:nx,y:ny}];
  recompute();render();}
function recompute(){const m=activeMetric();S.values[S.active]=computeValue(m,S.points[S.active]||[],S.nat.w,S.nat.h);}

function renderManual(){
  const left=document.getElementById("left");
  const wrap=h(`<div class="rounded-2xl bg-white p-4 ring-1 ring-slate-200 sm:p-5">
    <p class="mb-4 text-sm text-slate-600">Already measured your angles with a digital protractor? Type them in. Leave a box blank and it won't count toward your score.</p>
    <div class="space-y-3" id="manualRows"></div></div>`);
  left.appendChild(wrap);
  const rows=document.getElementById("manualRows");
  METRICS.forEach(m=>{const[mn,mx]=idealFor(m,S.gender);const v=S.values[m.id];
    const row=h(`<div class="flex items-center gap-3">
      <div class="min-w-0 flex-1"><p class="truncate text-sm font-semibold text-slate-800">${m.name}</p>
      <p class="text-xs text-slate-400">balanced ${mn}${m.unit==="deg"?"°":""} to ${mx}${m.unit==="deg"?"°":""}</p></div>
      <input type="number" step="${m.unit==="deg"?1:0.01}" value="${v==null?"":v}" placeholder="${m.unit==="deg"?"deg":"ratio"}"
       class="w-28 rounded-lg border border-slate-300 px-3 py-2 text-right text-sm font-semibold text-slate-800 outline-none focus:border-emerald-500 focus:ring-2 focus:ring-emerald-200"/></div>`);
    const inp=row.querySelector("input");
    inp.oninput=()=>{const raw=inp.value.trim();S.values[m.id]=raw===""?null:(isNaN(Number(raw))?null:Number(raw));renderResults();};
    rows.appendChild(row);});
}

function renderResults(){
  const right=document.getElementById("right");right.innerHTML="";
  const sc=overall(S.values,S.gender);const[lbl,col]=sc!=null?band(sc):["Add a measurement","#10b981"];
  const filled=METRICS.filter(m=>S.values[m.id]!=null).length;
  const circ=2*Math.PI*52;const dash=sc!=null?(sc/100)*circ:0;
  const wrap=h(`<div class="rounded-2xl bg-gradient-to-br from-emerald-50 via-white to-lime-50 p-4 ring-1 ring-emerald-200 sm:p-5">
    <div class="flex items-center gap-5">
      <div class="relative h-32 w-32 shrink-0">
        <svg viewBox="0 0 120 120" class="h-full w-full -rotate-90">
          <circle cx="60" cy="60" r="52" fill="none" stroke="#e2e8f0" stroke-width="12"/>
          <circle cx="60" cy="60" r="52" fill="none" stroke="${col}" stroke-width="12" stroke-linecap="round" stroke-dasharray="${dash} ${circ}"/>
        </svg>
        <div class="absolute inset-0 flex flex-col items-center justify-center">
          <span class="text-3xl font-bold text-slate-900">${sc==null?"—":sc}</span>
          <span class="text-[10px] font-semibold uppercase tracking-wider text-slate-400">/ 100</span>
        </div>
      </div>
      <div>
        <p class="text-xs font-semibold uppercase tracking-wider text-emerald-700">Harmony score</p>
        <p class="mt-1 text-xl font-bold text-slate-900">${lbl}</p>
        <p class="mt-1 text-sm text-slate-500">${filled} of ${METRICS.length} measured</p>
        <button id="saveBtn" class="mt-3 rounded-lg bg-emerald-600 px-4 py-2 text-sm font-semibold text-white shadow hover:bg-emerald-700 ${sc==null?"opacity-40 cursor-not-allowed":""}">💾 Save this result</button>
      </div>
    </div>
    <div class="mt-5 space-y-3" id="bars"></div>
  </div>`);
  right.appendChild(wrap);
  const bars=document.getElementById("bars");
  METRICS.forEach(m=>{const v=S.values[m.id];const s=scoreMetric(m,v,S.gender);const[mn,mx]=idealFor(m,S.gender);
    const row=h(`<div>
      <div class="flex items-center justify-between text-sm"><span class="font-semibold text-slate-700">${m.name}</span>
      <span class="tabular-nums text-slate-500">${fmt(m,v)}${s!=null?` <span class="ml-2 font-semibold" style="color:${m.color}">${s}/100</span>`:""}</span></div>
      <div class="mt-1 h-2 w-full overflow-hidden rounded-full bg-slate-200"><div class="h-full rounded-full transition-all duration-500" style="width:${s||0}%;background:${m.color}"></div></div>
      <p class="mt-0.5 text-[11px] text-slate-400">balanced ${mn}${m.unit==="deg"?"°":""} to ${mx}${m.unit==="deg"?"°":""}</p></div>`);
    bars.appendChild(row);});
  const sb=document.getElementById("saveBtn");
  if(sc!=null)sb.onclick=()=>{const now=new Date();
    S.saved=[{id:""+now.getTime(),label:now.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"}),
      gender:S.gender,values:{...S.values},score:sc},...S.saved].slice(0,20);persist();render();};
}

function renderSaved(){
  if(S.mode==="photo"||S.mode==="manual"){} // always show below grid
  const sec=h(`<div id="savedSec"></div>`);app.appendChild(sec);
  if(!S.saved.length){sec.appendChild(h(`<div class="mt-6 rounded-2xl border border-dashed border-slate-300 bg-slate-50 p-5 text-center text-sm text-slate-500">No saved results yet. Measure your face, then hit <strong>Save this result</strong>. Your history stays on this device so you can compare it on your next visit.</div>`));return;}
  const wrap=h(`<div class="mt-6 rounded-2xl bg-white p-4 ring-1 ring-slate-200 sm:p-5">
    <div class="mb-3 flex items-center justify-between"><h4 class="text-sm font-bold uppercase tracking-wider text-slate-500">Your saved results</h4>
    <span class="text-xs text-slate-400">tick two to compare</span></div><div class="space-y-2" id="savedList"></div></div>`);
  sec.appendChild(wrap);
  const list=document.getElementById("savedList");
  S.saved.forEach(s=>{const[lbl,col]=band(s.score);const checked=S.compare.includes(s.id);
    const row=h(`<div class="flex items-center gap-3 rounded-xl bg-slate-50 p-3 ring-1 ring-slate-200">
      <input type="checkbox" ${checked?"checked":""} class="h-4 w-4 shrink-0 accent-emerald-600"/>
      <span class="flex h-9 w-9 shrink-0 items-center justify-center rounded-lg text-sm font-bold text-white" style="background:${col}">${s.score}</span>
      <div class="min-w-0 flex-1"><p class="truncate text-sm font-semibold text-slate-800">${s.label} <span class="font-normal text-slate-400">· ${lbl}</span></p>
      <p class="truncate text-xs text-slate-400 capitalize">${s.gender} profile</p></div>
      <button class="rounded-lg bg-white px-2.5 py-1.5 text-xs font-semibold text-emerald-700 ring-1 ring-emerald-200 hover:bg-emerald-50" data-act="load">Load</button>
      <button class="rounded-lg bg-white px-2.5 py-1.5 text-xs font-semibold text-rose-600 ring-1 ring-rose-200 hover:bg-rose-50" data-act="del">✕</button></div>`);
    row.querySelector("input").onchange=()=>{const c=S.compare;
      if(c.includes(s.id))S.compare=c.filter(x=>x!==s.id);
      else S.compare=c.length>=2?[c[1],s.id]:[...c,s.id];render();};
    row.querySelector('[data-act=load]').onclick=()=>{S.gender=s.gender;S.values={...s.values};S.mode="manual";render();};
    row.querySelector('[data-act=del]').onclick=()=>{S.saved=S.saved.filter(x=>x.id!==s.id);S.compare=S.compare.filter(x=>x!==s.id);persist();render();};
    list.appendChild(row);});
}

function renderCompare(){
  const a=S.saved.find(s=>s.id===S.compare[0]);const b=S.saved.find(s=>s.id===S.compare[1]);
  if(!a&&!b)return;
  function delta(v,u){if(v===0)return `<span class="text-slate-400">0${u}</span>`;const up=v>0;
    return `<span class="${up?"text-emerald-600":"text-rose-500"}">${up?"▲ +":"▼ "}${v}${u}</span>`;}
  let rows=`<tr class="border-b border-slate-100 bg-emerald-50/40"><td class="px-4 py-2 font-bold text-slate-800">Harmony score</td>
    <td class="px-4 py-2 font-bold tabular-nums">${a?a.score:"—"}</td><td class="px-4 py-2 font-bold tabular-nums">${b?b.score:"—"}</td>
    <td class="px-4 py-2 font-bold tabular-nums">${a&&b?delta(b.score-a.score,""):"—"}</td></tr>`;
  METRICS.forEach(m=>{const va=a?a.values[m.id]:null,vb=b?b.values[m.id]:null;
    const d=(va!=null&&vb!=null)?Math.round((vb-va)*10)/10:null;
    rows+=`<tr class="border-b border-slate-100"><td class="px-4 py-2 text-slate-700">${m.name}</td>
      <td class="px-4 py-2 tabular-nums text-slate-600">${fmt(m,va)}</td><td class="px-4 py-2 tabular-nums text-slate-600">${fmt(m,vb)}</td>
      <td class="px-4 py-2 tabular-nums">${d!=null?delta(d,m.unit==="deg"?"°":""):"—"}</td></tr>`;});
  app.appendChild(h(`<div class="mt-4 overflow-hidden rounded-2xl bg-white ring-1 ring-slate-200">
    <div class="bg-slate-900 px-4 py-3"><h4 class="text-sm font-bold uppercase tracking-wider text-white">Compare results</h4></div>
    <div class="overflow-x-auto"><table class="w-full min-w-[420px] text-sm">
      <thead><tr class="border-b border-slate-200 text-left text-xs uppercase tracking-wider text-slate-400">
      <th class="px-4 py-2 font-semibold">Measurement</th><th class="px-4 py-2 font-semibold">${a?a.label:"—"}</th>
      <th class="px-4 py-2 font-semibold">${b?b.label:"—"}</th><th class="px-4 py-2 font-semibold">Change</th></tr></thead>
      <tbody>${rows}</tbody></table></div></div>`));
}

render();
</script>
</body>
</html>
